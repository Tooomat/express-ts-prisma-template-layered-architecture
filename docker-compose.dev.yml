version: "3.9"

volumes:
  xxx-app-data-dev:
  xxx-redis-data-dev:
  xxx-postgres-data-dev:
  
services:
  app:
    container_name: app-dev
    image: xxxxxx:latest
    build:
      context: .
      target: dev
    command: npm run dev
    env_file:
      - .env.development.docker
    ports: 
      - "${APP_PORT}:${APP_PORT}"
    volumes:
      - .:/app
      - xxx-app-data-dev:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    container_name: postgres-dev
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - xxx-postgres-data-dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      # test: ["CMD-SHELL", "pg_isready -h localhost -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10


  redis:
    image: redis:8
    container_name: redis-dev
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - xxx-redis-data-dev:/data
      - ./src/config/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10